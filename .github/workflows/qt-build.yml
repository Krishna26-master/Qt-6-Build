name: Build Qt 6.8.3
on:
  workflow_dispatch:
    inputs:
      qt_version:
        description: 'Qt version'
        required: true
        default: '6.8.3'
        type: choice
        options:
          - '6.8.3'
          - '6.8.2'
          - '6.8.1'
      modules:
        description: 'Modules to build (comma-separated)'
        required: true
        default: 'qtbase,qtdeclarative,qtwayland,qtsvg,qttools,qtshadertools'
        type: string
jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download Qt sources
        run: |
          VERSION="${{ github.event.inputs.qt_version }}"
          MAJOR_MINOR="${VERSION%.*}"
          BASE_URL="https://download.qt.io/official_releases/qt/$MAJOR_MINOR/$VERSION/submodules"
          
          mkdir -p qt-sources
          cd qt-sources
          
          echo "Downloading Qt $VERSION..."
          for mod in qtbase qtdeclarative qtwayland qtsvg qttools qtshadertools; do
            echo "Downloading $mod..."
            curl -sL -o "${mod}-everywhere-src-$VERSION.tar.xz" "$BASE_URL/${mod}-everywhere-src-$VERSION.tar.xz"
            if file "$mod"-everywhere-src-"$VERSION".tar.xz 2>/dev/null | grep -q "XZ compressed"; then
              echo "✓ $mod downloaded"
            else
              echo "✗ Failed: $mod"
              ls -la "$mod"-everywhere-src-"$VERSION".tar.xz 2>/dev/null || true
              exit 1
            fi
          done
          ls -la
      - name: Extract sources
        run: |
          cd qt-sources
          for f in qt*-everywhere-src-*.tar.xz; do
            tar -xf "$f"
          done
          ls -la
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            libgl1-mesa-dev \
            libxcb1-dev libxcb-xinput-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libx11-xcb-dev libegl1 \
            libinput-dev libudev-dev \
            libdbus-1-dev \
            libfontconfig1-dev libfreetype6-dev \
            libharfbuzz-dev libpng-dev libjpeg-dev
      - name: Build Qt base
        run: |
          VERSION="${{ github.event.inputs.qt_version }}"
          cd qt-sources/qtbase-everywhere-src-$VERSION
          export CFLAGS="-O3 -pipe"
          export CXXFLAGS="-O3 -pipe"
          export QT_GCC_BUILD_OPTIMIZE="3"
          ./configure \
            -prefix $RUNNER_TEMP/Qt6-built \
            -release -optimize-size -no-widgets \
            -no-sql-db2 -no-sql-ibase -no-sql-mysql -no-sql-oci -no-sql-odbc -no-sql-psql -no-sql-mimer \
            -no-dbus -no-openssl
          cmake --build . --parallel
          cmake --install .
      - name: Build Qt declarative
        run: |
          VERSION="${{ github.event.inputs.qt_version }}"
          cd qt-sources/qtdeclarative-everywhere-src-$VERSION
          export CFLAGS="-O3 -pipe"
          export CXXFLAGS="-O3 -pipe"
          cmake -G Ninja -DCMAKE_INSTALL_PREFIX=$RUNNER_TEMP/Qt6-built -B build -S .
          cmake --build build --parallel
          cmake --install build
      - name: Build Qt wayland
        run: |
          VERSION="${{ github.event.inputs.qt_version }}"
          cd qt-sources/qtwayland-everywhere-src-$VERSION
          export CFLAGS="-O3 -pipe"
          export CXXFLAGS="-O3 -pipe"
          cmake -G Ninja -DCMAKE_INSTALL_PREFIX=$RUNNER_TEMP/Qt6-built -B build -S .
          cmake --build build --parallel
          cmake --install build
      - name: Build Qt svg
        run: |
          VERSION="${{ github.event.inputs.qt_version }}"
          cd qt-sources/qtsvg-everywhere-src-$VERSION
          export CFLAGS="-O3 -pipe"
          export CXXFLAGS="-O3 -pipe"
          cmake -G Ninja -DCMAKE_INSTALL_PREFIX=$RUNNER_TEMP/Qt6-built -B build -S .
          cmake --build build --parallel
          cmake --install build
      - name: Build Qt tools
        run: |
          VERSION="${{ github.event.inputs.qt_version }}"
          cd qt-sources/qttools-everywhere-src-$VERSION
          export CFLAGS="-O3 -pipe"
          export CXXFLAGS="-O3 -pipe"
          cmake -G Ninja -DCMAKE_INSTALL_PREFIX=$RUNNER_TEMP/Qt6-built -B build -S .
          cmake --build build --parallel
          cmake --install build
      - name: Build Qt shadertools
        run: |
          VERSION="${{ github.event.inputs.qt_version }}"
          cd qt-sources/qtshadertools-everywhere-src-$VERSION
          export CFLAGS="-O3 -pipe"
          export CXXFLAGS="-O3 -pipe"
          cmake -G Ninja -DCMAKE_INSTALL_PREFIX=$RUNNER_TEMP/Qt6-built -B build -S .
          cmake --build build --parallel
          cmake --install build
      - name: Package Qt
        run: |
          cd $RUNNER_TEMP
          tar -czf qt${{ github.event.inputs.qt_version }}-minimal.tar.gz Qt6-built/
          ls -lh qt*-minimal.tar.gz
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: qt${{ github.event.inputs.qt_version }}-minimal.tar.gz
          name: Qt ${{ github.event.inputs.qt_version }} Build
          body: |
            Minimal Qt build for Linux x86_64
            - Qt: ${{ github.event.inputs.qt_version }}
            - Built on: Ubuntu 24.04 LTS
            - Modules: qtbase, qtdeclarative, qtwayland, qtsvg, qttools, qtshadertools
            - Optimizations: -O3 -pipe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

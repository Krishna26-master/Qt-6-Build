name: Build Qt 6.8.3

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/qt-build.yml'
  workflow_dispatch:
    inputs:
      qt_version:
        description: 'Qt version'
        required: true
        default: '6.8.3'
        type: choice
        options:
          - '6.8.3'
          - '6.8.2'
          - '6.8.1'

env:
  QT_VERSION: ${{ github.event.inputs.qt_version || '6.8.3' }}

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Qt sources
        id: cache-sources
        uses: actions/cache@v4
        with:
          path: qt-sources
          key: qt-sources-${{ env.QT_VERSION }}-${{ hashFiles('.github/workflows/qt-build.yml') }}

      - name: Download Qt sources (if not cached)
        if: steps.cache-sources.outputs.cache-hit != 'true'
        run: |
          VERSION="${{ env.QT_VERSION }}"
          MAJOR_MINOR="${VERSION%.*}"
          BASE_URL="https://download.qt.io/official_releases/qt/$MAJOR_MINOR/$VERSION/submodules"
          mkdir -p qt-sources
          cd qt-sources
          for mod in qtbase qtdeclarative qtwayland qtsvg qtshadertools; do
            curl -sL -o "${mod}-everywhere-src-$VERSION.tar.xz" "$BASE_URL/${mod}-everywhere-src-$VERSION.tar.xz"
          done

      - name: Extract sources
        run: |
          cd qt-sources
          for f in qt*-everywhere-src-*.tar.xz; do tar -xf "$f"; done

      - name: Cache system dependencies
        uses: actions/cache@v4
        with:
          path: ~/Qt6-built
          key: qt-built-${{ env.QT_VERSION }}-${{ github.sha }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            libgl1-mesa-dev libxcb1-dev libxcb-xinput-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libx11-xcb-dev libegl1 \
            libinput-dev libudev-dev libdbus-1-dev \
            libfontconfig1-dev libfreetype6-dev libharfbuzz-dev libpng-dev libjpeg-dev

      - name: Build Qt base
        if: steps.cache-sources.outputs.cache-hit != 'true'
        run: |
          VERSION="${{ env.QT_VERSION }}"
          cd qt-sources/qtbase-everywhere-src-$VERSION
          export CFLAGS="-O3 -pipe"
          export CXXFLAGS="-O3 -pipe"
          ./configure -prefix $RUNNER_TEMP/Qt6-built -release -optimize-size -no-widgets \
            -no-sql-db2 -no-sql-ibase -no-sql-mysql -no-sql-oci -no-sql-odbc -no-sql-psql -no-sql-mimer \
            -no-dbus -no-openssl
          cmake --build . --parallel
          cmake --install .

      - name: Build Qt declarative
        if: steps.cache-sources.outputs.cache-hit != 'true'
        run: |
          VERSION="${{ env.QT_VERSION }}"
          cd qt-sources/qtdeclarative-everywhere-src-$VERSION
          export CFLAGS="-O3 -pipe"
          export CXXFLAGS="-O3 -pipe"
          cmake -G Ninja -DCMAKE_INSTALL_PREFIX=$RUNNER_TEMP/Qt6-built -B build -S .
          cmake --build build --parallel
          cmake --install build

      - name: Build Qt wayland
        if: steps.cache-sources.outputs.cache-hit != 'true'
        run: |
          VERSION="${{ env.QT_VERSION }}"
          cd qt-sources/qtwayland-everywhere-src-$VERSION
          export CFLAGS="-O3 -pipe"
          export CXXFLAGS="-O3 -pipe"
          cmake -G Ninja -DCMAKE_INSTALL_PREFIX=$RUNNER_TEMP/Qt6-built -B build -S .
          cmake --build build --parallel
          cmake --install build

      - name: Build Qt svg
        if: steps.cache-sources.outputs.cache-hit != 'true'
        run: |
          VERSION="${{ env.QT_VERSION }}"
          cd qt-sources/qtsvg-everywhere-src-$VERSION
          export CFLAGS="-O3 -pipe"
          export CXXFLAGS="-O3 -pipe"
          cmake -G Ninja -DCMAKE_INSTALL_PREFIX=$RUNNER_TEMP/Qt6-built -B build -S .
          cmake --build build --parallel
          cmake --install build

      - name: Build Qt shadertools
        if: steps.cache-sources.outputs.cache-hit != 'true'
        run: |
          VERSION="${{ env.QT_VERSION }}"
          cd qt-sources/qtshadertools-everywhere-src-$VERSION
          export CFLAGS="-O3 -pipe"
          export CXXFLAGS="-O3 -pipe"
          cmake -G Ninja -DCMAKE_INSTALL_PREFIX=$RUNNER_TEMP/Qt6-built -B build -S .
          cmake --build build --parallel
          cmake --install build

      - name: Package Qt
        run: |
          cd $RUNNER_TEMP
          tar -czf qt${{ env.QT_VERSION }}-minimal.tar.gz Qt6-built/
          cp qt${{ env.QT_VERSION }}-minimal.tar.gz ${{ github.workspace }}/
          ls -lh qt*-minimal.tar.gz

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qt${{ env.QT_VERSION }}-minimal.tar.gz
          path: qt${{ env.QT_VERSION }}-minimal.tar.gz
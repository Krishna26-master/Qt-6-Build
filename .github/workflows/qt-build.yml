name: Build Qt 6.8.3

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/qt-build.yml'
  workflow_dispatch:
    inputs:
      qt_version:
        description: 'Qt version'
        required: true
        default: '6.8.3'
        type: choice
        options:
          - '6.8.3'
          - '6.8.2'
          - '6.8.1'

env:
  QT_VERSION: ${{ github.event.inputs.qt_version || '6.8.3' }}

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Qt sources
        run: |
          VERSION="${{ env.QT_VERSION }}"
          MAJOR_MINOR="${VERSION%.*}"
          BASE_URL="https://download.qt.io/official_releases/qt/$MAJOR_MINOR/$VERSION/submodules"
          mkdir -p qt-sources
          cd qt-sources
          # CORRECT ORDER: qtbase, qtshadertools, qtdeclarative, qtwayland, qtsvg
          for mod in qtbase qtshadertools qtdeclarative qtwayland qtsvg; do
            curl -sL -o "${mod}-everywhere-src-$VERSION.tar.xz" "$BASE_URL/${mod}-everywhere-src-$VERSION.tar.xz"
          done

      - name: Extract sources
        run: |
          cd qt-sources
          for f in qt*-everywhere-src-*.tar.xz; do tar -xf "$f"; done

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libgl1-mesa-dev libxcb1-dev libxcb-xinput-dev libxkbcommon-dev libxkbcommon-x11-dev libx11-xcb-dev libegl1 libinput-dev libudev-dev libdbus-1-dev libfontconfig1-dev libfreetype6-dev libharfbuzz-dev libpng-dev libjpeg-dev

      - name: Build Qt base
        run: |
          VERSION="${{ env.QT_VERSION }}"
          cd qt-sources/qtbase-everywhere-src-$VERSION
          export CFLAGS="-O3 -pipe"
          export CXXFLAGS="-O3 -pipe"
          ./configure -prefix $RUNNER_TEMP/Qt6-built -release -optimize-size -no-sql-db2 -no-sql-ibase -no-sql-mysql -no-sql-oci -no-sql-odbc -no-sql-psql -no-sql-mimer -no-dbus -no-openssl
          cmake --build . --parallel
          cmake --install .

      - name: Build Qt shadertools (MUST be before qtdeclarative)
        run: |
          VERSION="${{ env.QT_VERSION }}"
          cd qt-sources/qtshadertools-everywhere-src-$VERSION
          export CFLAGS="-O3 -pipe"
          export CXXFLAGS="-O3 -pipe"
          cmake -G Ninja -DCMAKE_INSTALL_PREFIX=$RUNNER_TEMP/Qt6-built -B build -S .
          cmake --build build --parallel
          cmake --install build

      - name: Build Qt declarative (now has qsb tool)
        run: |
          VERSION="${{ env.QT_VERSION }}"
          cd qt-sources/qtdeclarative-everywhere-src-$VERSION
          export CFLAGS="-O3 -pipe"
          export CXXFLAGS="-O3 -pipe"
          cmake -G Ninja -DCMAKE_INSTALL_PREFIX=$RUNNER_TEMP/Qt6-built -B build -S .
          cmake --build build --parallel
          cmake --install build

      - name: Build Qt wayland
        run: |
          VERSION="${{ env.QT_VERSION }}"
          cd qt-sources/qtwayland-everywhere-src-$VERSION
          export CFLAGS="-O3 -pipe"
          export CXXFLAGS="-O3 -pipe"
          cmake -G Ninja -DCMAKE_INSTALL_PREFIX=$RUNNER_TEMP/Qt6-built -B build -S .
          cmake --build build --parallel
          cmake --install build

      - name: Build Qt svg
        run: |
          VERSION="${{ env.QT_VERSION }}"
          cd qt-sources/qtsvg-everywhere-src-$VERSION
          export CFLAGS="-O3 -pipe"
          export CXXFLAGS="-O3 -pipe"
          cmake -G Ninja -DCMAKE_INSTALL_PREFIX=$RUNNER_TEMP/Qt6-built -B build -S .
          cmake --build build --parallel
          cmake --install build

      - name: Package Qt
        run: |
          cd $RUNNER_TEMP
          tar -czf qt${{ env.QT_VERSION }}-minimal.tar.gz Qt6-built/
          cp qt${{ env.QT_VERSION }}-minimal.tar.gz ${{ github.workspace }}/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qt${{ env.QT_VERSION }}-minimal.tar.gz
          path: qt${{ env.QT_VERSION }}-minimal.tar.gz
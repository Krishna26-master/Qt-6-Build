name: Build Qt 6.8.3
on:
  workflow_dispatch:
    inputs:
      qt_version:
        description: 'Qt version'
        required: true
        default: '6.8.3'
        type: choice
        options:
          - '6.8.3'
          - '6.8.2'
          - '6.8.1'
      modules:
        description: 'Modules to build'
        required: true
        default: 'qtbase,qtdeclarative,qtwayland,qtsvg,qttools,qtshadertools'
        type: string
jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download Qt sources
        run: |
          MODULES="qtbase qtdeclarative qtwayland qtsvg qttools qtshadertools"
          VERSION="${{ github.event.inputs.qt_version }}"
          BASE_URL="https://download.qt.io/official_releases/qt/$VERSION/$VERSION/submodules"
          
          for mod in $MODULES; do
            curl -sLO "$BASE_URL/${mod}-everywhere-src-$VERSION.tar.xz"
          done
      
      - name: Extract sources
        run: |
          for f in *.tar.xz; do
            tar -xf "$f"
          done
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgl1-mesa-dev \
            libxcb1-dev \
            libxcb-xinput-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libx11-xcb-dev \
            libegl1 \
            libinput-dev \
            libudev-dev \
            libdbus-1-dev \
            libsystemd-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libpng-dev \
            libjpeg-dev \
            libsqlcipher-dev \
            ninja-build \
            cmake
      
      - name: Build Qt base
        run: |
          cd qtbase-everywhere-src-*/
          ./configure \
            -prefix $RUNNER_TEMP/Qt \
            -no-widgets \
            -no-sql-db2 \
            -no-sql-ibase \
            -no-sql-mysql \
            -no-sql-oci \
            -no-sql-odbc \
            -no-sql-psql \
            -no-sql-mimer
          cmake --build . --parallel
          cmake --install .
      
      - name: Build Qt declarative
        run: |
          cd qtdeclarative-*/
          cmake -G Ninja \
            -DCMAKE_INSTALL_PREFIX=$RUNNER_TEMP/Qt \
            -B build -S .
          cmake --build build --parallel
          cmake --install build
      
      - name: Build Qt wayland
        run: |
          cd qtwayland-*/
          cmake -G Ninja \
            -DCMAKE_INSTALL_PREFIX=$RUNNER_TEMP/Qt \
            -B build -S .
          cmake --build build --parallel
          cmake --install build
      
      - name: Build Qt svg
        run: |
          cd qtsvg-*/
          cmake -G Ninja \
            -DCMAKE_INSTALL_PREFIX=$RUNNER_TEMP/Qt \
            -B build -S .
          cmake --build build --parallel
          cmake --install build
      
      - name: Build Qt tools
        run: |
          cd qttools-*/
          cmake -G Ninja \
            -DCMAKE_INSTALL_PREFIX=$RUNNER_TEMP/Qt \
            -B build -S .
          cmake --build build --parallel
          cmake --install build
      
      - name: Build Qt shadertools
        run: |
          cd qtshadertools-*/
          cmake -G Ninja \
            -DCMAKE_INSTALL_PREFIX=$RUNNER_TEMP/Qt \
            -B build -S .
          cmake --build build --parallel
          cmake --install build
      
      - name: Package Qt
        run: |
          cd $RUNNER_TEMP
          tar -cvzf qt${{ github.event.inputs.qt_version }}-minimal.tar.gz \
            Qt/
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: qt${{ github.event.inputs.qt_version }}-minimal.tar.gz
          name: Qt ${{ github.event.inputs.qt_version }} Build
          body: |
            Minimal Qt build for Linux x86_64
            - Qt version: ${{ github.event.inputs.qt_version }}
            - Built on: ubuntu-24.04
            - Modules: qtbase, qtdeclarative, qtwayland, qtsvg, qttools, qtshadertools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
